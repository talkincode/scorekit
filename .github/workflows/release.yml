name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            builder: cargo
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            builder: cross
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-14
            builder: cargo
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            builder: cargo
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            builder: cargo
            archive: zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Install cross
        if: matrix.builder == 'cross'
        uses: taiki-e/install-action@cross
      - name: Build release binary
        shell: bash
        run: ${{ matrix.builder }} build --locked --release --target ${{ matrix.target }}
      - name: Smoke test native binary
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: target/${{ matrix.target }}/release/scorekit${{ matrix.archive == 'zip' && '.exe' || '' }} --version
      - name: Package Unix release
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          package="scorekit-${{ matrix.target }}"
          mkdir -p "staging/${package}" dist
          cp "target/${{ matrix.target }}/release/scorekit" "staging/${package}/"
          cp README.md LICENSE "staging/${package}/"
          cp -R skills "staging/${package}/"
          tar -C staging -czf "dist/${package}.tar.gz" "${package}"
      - name: Package Windows release
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $package = "scorekit-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "staging/$package", dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/scorekit.exe" "staging/$package/"
          Copy-Item README.md, LICENSE "staging/$package/"
          Copy-Item -Recurse skills "staging/$package/skills"
          Compress-Archive -Path "staging/$package" -DestinationPath "dist/$package.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: scorekit-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Cargo package version
        shell: bash
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          test "${GITHUB_REF_NAME}" = "v${version}"
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum scorekit-* > SHA256SUMS
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/scorekit-*
            dist/SHA256SUMS

  homebrew:
    name: Update Homebrew tap
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    env:
      # Set HOMEBREW_TAP_TOKEN to a fine-grained PAT with push access to the
      # tap repository. Without it this job no-ops, so fork releases and early
      # releases before the secret exists do not fail.
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      HOMEBREW_TAP_REPO: talkincode/homebrew-tap
    steps:
      - name: Download release artifacts
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: scorekit-*
          path: dist-artifacts
          merge-multiple: true

      - name: Render and push formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          CHECKSUMS="dist-artifacts/SHA256SUMS"

          (cd dist-artifacts && sha256sum scorekit-*.tar.gz > SHA256SUMS)

          sha() {
            local hash
            hash="$(awk -v f="$1" '$2 == f { print $1; exit }' "$CHECKSUMS")"
            [ -n "$hash" ] || { echo "missing checksum for $1" >&2; exit 1; }
            echo "$hash"
          }

          DARWIN_ARM64_SHA="$(sha scorekit-aarch64-apple-darwin.tar.gz)"
          DARWIN_X86_64_SHA="$(sha scorekit-x86_64-apple-darwin.tar.gz)"
          LINUX_ARM64_SHA="$(sha scorekit-aarch64-unknown-linux-gnu.tar.gz)"
          LINUX_X86_64_SHA="$(sha scorekit-x86_64-unknown-linux-gnu.tar.gz)"

          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/scorekit.rb <<EOF
          class Scorekit < Formula
            desc "Agent-oriented music compiler for game-ready loops and stems"
            homepage "https://github.com/talkincode/scorekit"
            version "${VERSION}"
            license "MIT"

            depends_on "ffmpeg"
            depends_on "fluid-synth"

            resource "musescore_general_soundfont" do
              url "https://ftp.osuosl.org/pub/musescore/soundfont/MuseScore_General/MuseScore_General.sf2"
              sha256 "ee51d2c4b1525e70f19a45909c4fd7a2e26d91d115fa89dbf5a6bc413d8b9bf3"
            end

            resource "musescore_general_license" do
              url "https://ftp.osuosl.org/pub/musescore/soundfont/MuseScore_General/MuseScore_General_License.md"
              sha256 "5ad8d737e13c7f01f5b9674872a82a92b4ba253603e8ed14b9db12293550b4b9"
            end

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/scorekit-aarch64-apple-darwin.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "${BASE_URL}/scorekit-x86_64-apple-darwin.tar.gz"
                sha256 "${DARWIN_X86_64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/scorekit-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "${BASE_URL}/scorekit-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X86_64_SHA}"
              end
            end

            def install
              package_dir = Dir["scorekit-*"].first
              libexec.install "#{package_dir}/scorekit"
              bin.write_env_script libexec/"scorekit",
                                   SCOREKIT_SOUND_LIBRARY_DIR: (pkgshare/"sounds").to_s

              pkgshare.install "#{package_dir}/skills" if File.directory?("#{package_dir}/skills")
              resource("musescore_general_soundfont").stage do
                (pkgshare/"sounds/sf2").install "MuseScore_General.sf2"
              end
              resource("musescore_general_license").stage do
                (pkgshare/"sounds/sf2").install "MuseScore_General_License.md"
              end
            end

            def caveats
              <<~EOS
                The bundled Agent skill is installed under:
                  #{pkgshare}/skills/scorekit

                The scorekit wrapper sets SCOREKIT_SOUND_LIBRARY_DIR to:
                  #{pkgshare}/sounds

                Set SCOREKIT_SOUND_LIBRARY_DIR yourself or pass --soundfont to use a
                project-managed sound library instead.
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/scorekit --version")
              assert_match "scorekit_version", shell_output("#{bin}/scorekit --json doctor")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/scorekit.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${VERSION}"
          else
            git commit -m "scorekit ${VERSION}"
            git push
          fi
